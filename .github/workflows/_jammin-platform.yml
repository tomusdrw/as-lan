name: Build one jammin platform

# Reusable workflow that builds a single platform of jammin-as-lan.
#
# Called twice from docker-jammin.yml: once in "smoke-test" mode (push=false,
# runs on every trigger including PRs) and once in "publish" mode (push=true,
# non-PR only). The two callers forward different permission sets so that the
# packages:write token is never present in a runner that just executed
# PR-supplied build code.

on:
  workflow_call:
    inputs:
      platform:
        description: 'Docker platform string (e.g. linux/amd64).'
        type: string
        required: true
      runner:
        description: 'GitHub Actions runner label native to `platform`.'
        type: string
        required: true
      image:
        description: 'Image name without a tag (e.g. ghcr.io/owner/jammin-as-lan).'
        type: string
        required: true
      primary-tag:
        description: 'Fully-qualified image:tag used to load and smoke-test the build locally.'
        type: string
        required: true
      push:
        description: 'When true, push the built image to GHCR by digest and upload the digest as an artifact.'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    # Permissions are inherited from the calling job. GitHub Actions requires
    # any `permissions` declared here to be a subset of the caller's grants,
    # so we can't declare `packages: write` unconditionally — the smoke-test
    # caller only grants `contents: read`, and the call would fail validation.
    # Smoke-test callers grant only `contents: read` (push steps are gated on
    # `inputs.push` and skipped). Publish callers additionally grant
    # `packages: write` so the GHCR login + push-by-digest can run.
    steps:
      - name: Checkout (release tag)
        if: github.event_name == 'release'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Checkout (branch or PR)
        if: github.event_name != 'release'
        uses: actions/checkout@v6

      - name: Normalize platform label
        id: platform
        run: |
          p='${{ inputs.platform }}'
          echo "pair=${p//\//-}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Build image (load into local docker for smoke test)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/jammin-as-lan.Dockerfile
          platforms: ${{ inputs.platform }}
          load: true
          tags: ${{ inputs.primary-tag }}
          cache-from: type=gha,scope=${{ steps.platform.outputs.pair }}
          cache-to: type=gha,mode=max,scope=${{ steps.platform.outputs.pair }}

      - name: Smoke test — wasm-pvm and node on PATH
        run: |
          set -eux
          # wasm-pvm is a subcommand-style CLI; --help is the built-in
          # clap flag that exits 0 and proves the binary loaded without
          # dynamic-linker errors (glibc version, missing shared libs, …).
          docker run --rm "${{ inputs.primary-tag }}" wasm-pvm --help
          docker run --rm "${{ inputs.primary-tag }}" node --version
          # asc must be on PATH from the global assemblyscript install.
          docker run --rm "${{ inputs.primary-tag }}" asc --version

      - name: Smoke test — no-args run prints help and exits 64
        run: |
          set -eu
          # Default CMD is a usage message that exits 64 (EX_USAGE). Guards
          # against a future refactor that accidentally restores an
          # `npm install`-bearing CMD; jammin always passes its own command,
          # so this CMD should never run during normal use.
          set +e
          out=$(docker run --rm "${{ inputs.primary-tag }}")
          rc=$?
          set -e
          echo "$out"
          if [ "$rc" -ne 64 ]; then
            echo "::error::expected exit 64 from no-args run, got $rc"
            exit 1
          fi
          echo "$out" | grep -q 'jammin-as-lan: builder image'

      - name: Smoke test — pre-baked SDK resolves without npm install
        run: |
          set -eux
          # A service mounted at /app with no node_modules must still
          # compile via `asc` because the entrypoint symlinks the global
          # node_modules into /app/node_modules.
          stub=$(mktemp -d)
          mkdir -p "$stub/assembly"
          cat > "$stub/package.json" <<'EOF'
          {
            "name": "smoke-stub",
            "version": "0.0.0",
            "type": "module",
            "scripts": {
              "asbuild": "asc assembly/index.ts --target debug --runtime=stub"
            }
          }
          EOF
          cat > "$stub/assembly/index.ts" <<'EOF'
          import { Bytes32 } from "@fluffylabs/as-lan/core/bytes";
          export function ping(): u32 {
            return Bytes32.zero().length;
          }
          EOF
          docker run --rm -v "$stub:/app" "${{ inputs.primary-tag }}" \
            npm run asbuild

      - name: Smoke test — pvm-adapter.wat reachable from /app/node_modules
        run: |
          set -eux
          # jammin's default `pvm` script invokes wasm-pvm with
          # `--adapter node_modules/@fluffylabs/as-lan/pvm-adapter.wat`,
          # a relative path resolved from the service cwd (/app). This
          # regresses if the SDK is installed via a path that bypasses the
          # `prepack` hook (e.g. `npm install -g <localdir>` without
          # packing first), because pvm-adapter.wat is staged into the
          # package by prepack.
          stub=$(mktemp -d)
          docker run --rm -v "$stub:/app" "${{ inputs.primary-tag }}" \
            test -f node_modules/@fluffylabs/as-lan/pvm-adapter.wat

      - name: Smoke test — entrypoint cleans up /app/node_modules symlink
        run: |
          set -eux
          # /app is bind-mounted, so any symlink the entrypoint creates
          # there leaks onto the host. Verify the entrypoint removes it
          # on exit, otherwise users see a dangling
          # services/<svc>/node_modules -> /usr/local/lib/node_modules
          # link that breaks subsequent host-side `npm install`.
          stub=$(mktemp -d)
          docker run --rm -v "$stub:/app" "${{ inputs.primary-tag }}" \
            true
          if [ -L "$stub/node_modules" ] || [ -e "$stub/node_modules" ]; then
            echo "::error::entrypoint left node_modules behind in bind-mounted /app"
            ls -la "$stub"
            exit 1
          fi

      - name: Smoke test — entrypoint adopts orphan managed symlink
        run: |
          set -eux
          # Recovery path for SIGKILLed prior runs. SIGKILL bypasses our
          # EXIT/INT/TERM traps, so the managed symlink leaks onto the
          # host. The entrypoint should treat any /app/node_modules link
          # whose target matches our managed path as ours and clean it
          # up on the next successful run.
          stub=$(mktemp -d)
          ln -s /usr/local/lib/node_modules "$stub/node_modules"
          docker run --rm -v "$stub:/app" "${{ inputs.primary-tag }}" \
            true
          if [ -L "$stub/node_modules" ] || [ -e "$stub/node_modules" ]; then
            echo "::error::orphan managed symlink not reclaimed by entrypoint"
            ls -la "$stub"
            exit 1
          fi

      - name: Smoke test — entrypoint leaves user-supplied node_modules alone
        run: |
          set -eux
          # If the user mounts a real node_modules at /app, the entrypoint
          # must not delete it on exit. Same for a user-created symlink
          # pointing somewhere we don't manage.
          stub=$(mktemp -d)
          mkdir "$stub/node_modules"
          touch "$stub/node_modules/MARKER"
          docker run --rm -v "$stub:/app" "${{ inputs.primary-tag }}" \
            true
          if [ ! -f "$stub/node_modules/MARKER" ]; then
            echo "::error::entrypoint clobbered user-supplied node_modules"
            ls -la "$stub"
            exit 1
          fi

      - name: Report uncompressed image size
        run: |
          docker image inspect "${{ inputs.primary-tag }}" \
            --format 'uncompressed size: {{.Size}} bytes'

      - name: Login to GHCR
        if: inputs.push
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        if: inputs.push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/jammin-as-lan.Dockerfile
          platforms: ${{ inputs.platform }}
          outputs: type=image,name=${{ inputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.platform.outputs.pair }}

      - name: Export digest
        if: inputs.push
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.push.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload digest
        if: inputs.push
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.platform.outputs.pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1
