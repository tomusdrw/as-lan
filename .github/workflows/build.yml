name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  NODE_VERSION: 22.x

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    - name: Install LLVM 18 and Rust toolchain
      run: sudo apt-get update -qq && sudo apt-get install -y -qq llvm-18-dev
    - uses: dtolnay/rust-toolchain@stable
    - name: Cache wasm-pvm binary
      id: cache-wasm-pvm
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/wasm-pvm
        key: wasm-pvm-cli-0.5.0
    - name: Install wasm-pvm-cli
      if: steps.cache-wasm-pvm.outputs.cache-hit != 'true'
      run: cargo install wasm-pvm-cli
    - run: npm ci
    - run: npm run qa
    - run: npm run build
    - run: npm test --if-present
